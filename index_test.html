
<!DOCTYPE html>
<html>
<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" type="text/css" href="style.css">
    <link rel="shortcut icon" href="icon.png" >
    <title>39s-moe</title>
    <style>
        /* shinya sitebutton */
        .sitebutton-wrap {
            display: inline-block;
            vertical-align: middle;
        }

        .sitebutton-shinya {
            display: block;
            width: 88px;
            height: 31px;
            background: #0a0a12;
            border: 1px solid #9999cc;
            box-shadow: 0 0 0 1px #0a0a12, 0 0 6px #7766bb88;
            text-decoration: none;
            overflow: hidden;
            position: relative;
            image-rendering: pixelated;
            transition: box-shadow 0.2s, border-color 0.2s;
        }

        .sitebutton-shinya:hover {
            border-color: #ccaaff;
            box-shadow: 0 0 0 1px #0a0a12, 0 0 10px #aa88ffcc;
        }

        .sitebutton-shinya svg {
            width: 88px;
            height: 31px;
            display: block;
        }

        /* scanline flicker on hover */
        .sitebutton-shinya::after {
            content: '';
            position: absolute;
            inset: 0;
            background: repeating-linear-gradient(
                to bottom,
                transparent 0px,
                transparent 1px,
                rgba(0,0,0,0.25) 1px,
                rgba(0,0,0,0.25) 2px
            );
            pointer-events: none;
            opacity: 0.5;
        }
    </style>
</head>
