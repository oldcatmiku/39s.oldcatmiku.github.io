<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>It's me</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Noto+Sans+SC:wght@400;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --s: 90px;
    --g: 8px;
    --step: calc(var(--s) + var(--g));
    --bg: #f5f3ee;
    --border: #222;
    --cell-bg: #fff;
    --text: #111;
    --text-muted: #666;
  }

  html, body {
    min-height: 100vh;
    background: var(--bg);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-start;
    font-family: 'Noto Sans SC', sans-serif;
    padding: 40px 20px 60px;
  }

  h1.title-box {
    font-family: 'Anton', sans-serif;
    font-size: 28px;
    font-style: italic;
    letter-spacing: 2px;
    background: #111;
    color: #fff;
    padding: 10px 36px;
    border-radius: 3px;
    margin-bottom: 28px;
    user-select: none;
  }

  .grid-wrap {
    position: relative;
  }

  .cell {
    position: absolute;
    border: 1.5px solid var(--border);
    border-radius: 5px;
    overflow: hidden;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    background: var(--cell-bg);
    transition: border-color .2s, transform .15s, box-shadow .15s;
  }

  .cell:hover {
    border-color: #555;
    transform: scale(1.015);
    box-shadow: 0 4px 16px rgba(0,0,0,.12);
    z-index: 10;
  }

  .cell .label {
    font-size: 11px;
    color: var(--text-muted);
    text-align: center;
    padding: 6px;
    line-height: 1.5;
    white-space: pre-line;
    pointer-events: none;
    user-select: none;
    position: relative;
    z-index: 1;
    transition: opacity .2s;
  }

  .cell.big .label {
    font-size: 17px;
    font-weight: 700;
    color: var(--text);
    line-height: 1.3;
  }

  .cell img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    position: absolute;
    inset: 0;
    z-index: 0;
  }

  .cell input[type=file] { display: none; }

  .cell .overlay {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 6px;
    opacity: 0;
    transition: opacity .2s;
    background: rgba(0,0,0,.45);
    z-index: 2;
  }

  .cell:hover .overlay { opacity: 1; }

  .cell .overlay svg {
    width: 22px;
    height: 22px;
    stroke: #fff;
    fill: none;
    stroke-width: 1.8;
    stroke-linecap: round;
    stroke-linejoin: round;
  }

  .cell .overlay span {
    font-size: 11px;
    color: #fff;
    font-family: 'Noto Sans SC', sans-serif;
  }

  /* remove button on image */
  .cell .remove-btn {
    position: absolute;
    top: 5px;
    right: 5px;
    width: 22px;
    height: 22px;
    border-radius: 50%;
    background: rgba(0,0,0,.55);
    border: none;
    cursor: pointer;
    display: none;
    align-items: center;
    justify-content: center;
    z-index: 3;
    color: #fff;
    font-size: 13px;
    line-height: 1;
  }

  .cell:hover .remove-btn.visible { display: flex; }

  footer {
    margin-top: 36px;
    font-size: 12px;
    color: #aaa;
    font-family: 'Noto Sans SC', sans-serif;
  }
</style>
</head>
<body>

<h1 class="title-box">It's me</h1>
<div class="grid-wrap" id="grid"></div>

<script>
const S = 90;
const G = 8;
const step = S + G;

function pos(col, row, cs, rs) {
  return {
    left: col * step,
    top:  row * step,
    width:  cs * step - G,
    height: rs * step - G
  };
}

const cells = [
  { id:'style',    label:'你喜欢的\n风格',         ...pos(1,0,1,1) },
  { id:'food',     label:'你喜欢的\n食物',         ...pos(2,0,1,1) },
  { id:'music',    label:'你喜欢的\n音乐',         ...pos(4,0,2,2), big:true },
  { id:'drink',    label:'你喜欢的\n饮品或奶茶',    ...pos(0,1,1,1) },
  { id:'birthday', label:'你的\n生日',             ...pos(1,1,2,2), big:true },
  { id:'star',     label:'你的星座',               ...pos(3,1,1,1) },
  { id:'fruit',    label:'你最喜欢\n吃的水果',      ...pos(6,1,1,1) },
  { id:'mbti',     label:'你的\nMBTI',            ...pos(0,2,1,1), big:true },
  { id:'season',   label:'你喜欢的\n四季',         ...pos(3,2,1,1) },
  { id:'avatar',   label:'你的\n头像',             ...pos(4,2,2,2), big:true },
  { id:'role',     label:'你喜欢的\n角色或明星',    ...pos(6,2,1,1) },
  { id:'weather',  label:'你喜欢的\n天气',         ...pos(1,3,1,1) },
  { id:'color',    label:'你喜欢的\n颜色',         ...pos(2,3,2,2), big:true },
  { id:'place',    label:'想去的地方',              ...pos(4,4,1,1) },
  { id:'animal',   label:'你最喜欢的\n动物',        ...pos(3,5,1,1) },
];

const wrap = document.getElementById('grid');
const maxR = Math.max(...cells.map(c => c.left + c.width));
const maxB = Math.max(...cells.map(c => c.top  + c.height));
wrap.style.width  = maxR + 'px';
wrap.style.height = maxB + 'px';

const uploadIcon = `<svg viewBox="0 0 24 24"><polyline points="16 16 12 12 8 16"/><line x1="12" y1="12" x2="12" y2="21"/><path d="M20.39 18.39A5 5 0 0 0 18 9h-1.26A8 8 0 1 0 3 16.3"/></svg>`;

cells.forEach(c => {
  const div = document.createElement('div');
  div.className = 'cell' + (c.big ? ' big' : '');
  div.style.cssText = `left:${c.left}px;top:${c.top}px;width:${c.width}px;height:${c.height}px`;

  const lbl = document.createElement('div');
  lbl.className = 'label';
  lbl.textContent = c.label;

  const overlay = document.createElement('div');
  overlay.className = 'overlay';
  overlay.innerHTML = uploadIcon + '<span>上传图片</span>';

  const inp = document.createElement('input');
  inp.type = 'file';
  inp.accept = 'image/*';

  const rmBtn = document.createElement('button');
  rmBtn.className = 'remove-btn';
  rmBtn.textContent = '×';
  rmBtn.title = '移除图片';

  div.append(lbl, overlay, inp, rmBtn);

  div.addEventListener('click', e => {
    if (e.target === rmBtn) return;
    inp.click();
  });

  rmBtn.addEventListener('click', e => {
    e.stopPropagation();
    const img = div.querySelector('img');
    if (img) img.remove();
    lbl.style.opacity = '1';
    rmBtn.classList.remove('visible');
  });

  inp.addEventListener('change', e => {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = ev => {
      let img = div.querySelector('img');
      if (!img) { img = document.createElement('img'); div.prepend(img); }
      img.src = ev.target.result;
      lbl.style.opacity = '0';
      rmBtn.classList.add('visible');
    };
    reader.readAsDataURL(file);
    inp.value = '';
  });

  wrap.appendChild(div);
});
</script>
</body>
</html>
