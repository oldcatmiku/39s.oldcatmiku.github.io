
<style>
*{box-sizing:border-box;margin:0;padding:0}
.page{display:flex;flex-direction:column;align-items:center;padding:24px 12px;gap:16px}
.title-box{background:#111;color:#fff;font-size:20px;font-weight:700;font-style:italic;padding:9px 28px;border-radius:3px;letter-spacing:1px}
.grid-wrap{position:relative;width:560px;height:560px}
.cell{position:absolute;border:1.5px solid #333;border-radius:4px;overflow:hidden;cursor:pointer;display:flex;align-items:center;justify-content:center;background:var(--color-background-primary);transition:border-color .2s}
.cell:hover{border-color:#888}
.cell .label{font-size:11px;color:var(--color-text-secondary);text-align:center;padding:4px;line-height:1.4;white-space:pre-line;pointer-events:none;user-select:none;position:relative;z-index:1}
.cell.big .label{font-size:15px;font-weight:500;color:var(--color-text-primary)}
.cell img{width:100%;height:100%;object-fit:cover;position:absolute;inset:0;z-index:0}
.cell input[type=file]{display:none}
.cell .overlay{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;opacity:0;transition:opacity .2s;background:rgba(0,0,0,.4);z-index:2}
.cell:hover .overlay{opacity:1}
.cell .overlay i{color:#fff;font-size:20px}
</style>

<div class="page">
  <div class="title-box">It's me</div>
  <div class="grid-wrap" id="grid"></div>
</div>

<script>
/* 
  Grid unit = 80px, gap = 8px, so step = 88px
  Heart shape from original image — each cell is 1x1 unit (80x80) unless noted
  Origin top-left of grid-wrap

  Mapping (col, row) zero-indexed, size in units:
  Row 0: style(1,0,1,1), food(2,0,1,1), music(4,0,2,2)
  Row 1: drink(0,1,1,1), birthday(1,1,2,2 big), star(3,1,1,1), fruit(6,1,1,1)
  Row 2: mbti(0,2,1,1 big),                    season(3,2,1,1), avatar(4,2,2,2 big), role(6,2,1,1)
  Row 3:             weather(1,3,1,1), color(2,3,2,2 big),              place(4,3,2,1) -- wait, avatar spans rows 2-3
  Row 4:                               color continues,  place(4,4,2,1)? animal(3,5,2,1)
  
  Let me re-examine the image carefully:
  S=80, G=8, step=88

  Cells (col, row, colspan, rowspan):
  style    (1,0,1,1)
  food     (2,0,1,1)
  music    (4,0,2,2)   big
  drink    (0,1,1,1)
  birthday (1,1,2,2)   big
  star     (3,1,1,1)
  fruit    (6,1,1,1)
  mbti     (0,2,1,1)   bold text
  season   (3,2,1,1)
  avatar   (4,2,2,2)   big
  role     (6,2,1,1)
  weather  (1,3,1,1)
  color    (2,3,2,2)   big
  place    (4,4,2,1)   -- but avatar ends at row 4, so place is row4? 
  Actually avatar (4,2,2,2) occupies cols4-5, rows2-3. place is below avatar so row4 cols4-5?
  Hmm original: place is smaller, one row. Let me set place (4,4,1,1) col5? 
  Looking at image: place is roughly centered-right below avatar, single cell.
  animal   (3,5,2,1) or (3,5,1,1)?

  Let me just use pixel positions directly for fidelity.
*/

const S = 80; // cell size px
const G = 8;  // gap px
const step = S + G;

function pos(col, row, cs, rs) {
  return {
    left: col * step,
    top: row * step,
    width: cs * step - G,
    height: rs * step - G
  };
}

const cells = [
  {id:'style',   label:'你喜欢的\n风格',    ...pos(1,0,1,1)},
  {id:'food',    label:'你喜欢的\n食物',    ...pos(2,0,1,1)},
  {id:'music',   label:'你喜欢的\n音乐',    ...pos(4,0,2,2), big:true},
  {id:'drink',   label:'你喜欢的\n饮品或奶茶',...pos(0,1,1,1)},
  {id:'birthday',label:'你的\n生日',        ...pos(1,1,2,2), big:true},
  {id:'star',    label:'你的星座',           ...pos(3,1,1,1)},
  {id:'fruit',   label:'你最喜欢\n吃的水果', ...pos(6,1,1,1)},
  {id:'mbti',    label:'你的\nMBTI',       ...pos(0,2,1,1), big:true},
  {id:'season',  label:'你喜欢的\n四季',    ...pos(3,2,1,1)},
  {id:'avatar',  label:'你的\n头像',        ...pos(4,2,2,2), big:true},
  {id:'role',    label:'你喜欢的\n角色或明星',...pos(6,2,1,1)},
  {id:'weather', label:'你喜欢的\n天气',    ...pos(1,3,1,1)},
  {id:'color',   label:'你喜欢的\n颜色',    ...pos(2,3,2,2), big:true},
  {id:'place',   label:'想去的地方',         ...pos(4,4,1,1)},
  {id:'animal',  label:'你最喜欢的\n动物',  ...pos(3,5,1,1)},
];

// compute total bounding box
const maxR = Math.max(...cells.map(c=>c.left+c.width));
const maxB = Math.max(...cells.map(c=>c.top+c.height));
const wrap = document.getElementById('grid');
wrap.style.width = maxR + 'px';
wrap.style.height = maxB + 'px';

cells.forEach(c=>{
  const div = document.createElement('div');
  div.className = 'cell' + (c.big ? ' big' : '');
  div.style.left = c.left + 'px';
  div.style.top = c.top + 'px';
  div.style.width = c.width + 'px';
  div.style.height = c.height + 'px';

  const lbl = document.createElement('div');
  lbl.className = 'label';
  lbl.textContent = c.label;

  const overlay = document.createElement('div');
  overlay.className = 'overlay';
  overlay.innerHTML = '<i class="ti ti-upload" aria-hidden="true"></i>';

  const inp = document.createElement('input');
  inp.type = 'file';
  inp.accept = 'image/*';

  div.appendChild(lbl);
  div.appendChild(overlay);
  div.appendChild(inp);

  div.addEventListener('click', ()=> inp.click());
  inp.addEventListener('change', e=>{
    const file = e.target.files[0];
    if(!file) return;
    const reader = new FileReader();
    reader.onload = ev => {
      let img = div.querySelector('img');
      if(!img){ img = document.createElement('img'); div.insertBefore(img, lbl); }
      img.src = ev.target.result;
      lbl.style.opacity = '0';
    };
    reader.readAsDataURL(file);
  });

  wrap.appendChild(div);
});
</script>
