<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" type="text/css" href="style.css">
    <link rel="shortcut icon" href="icon.png" >
    <title>39s-moe</title>
    <style>
        .sitebutton-shinya {
            display: inline-block;
            width: 88px;
            height: 31px;
            position: relative;
            text-decoration: none;
            vertical-align: middle;
            image-rendering: pixelated;
        }

        .sitebutton-shinya svg {
            display: block;
            width: 88px;
            height: 31px;
        }

        .sitebutton-shinya:hover .btn-glow {
            opacity: 1;
        }

        .btn-glow {
            position: absolute;
            inset: -2px;
            border: 1px solid #f9a8d4;
            border-radius: 2px;
            opacity: 0;
            transition: opacity 0.25s;
            pointer-events: none;
            box-shadow: 0 0 6px #f9a8d499;
        }
    </style>
</head>
<body>
    <div class="img">
        <img src="title.png" height="300px" width="300px" alt="title_img">
    </div>
    <div class="border">
<pre>
    Welcome to oldcat's 39s site  ❀

    _      __
    '  )  /   )  
     -(  (__,/  __     ____  _   _
  (__ )     /  _)  x  / / / (_) /-
           /                    ￣

                         _(≧∇≦」∠)_
</pre>
    </div>
    <a href="https://virtualobserver.moe/"><img src="https://virtualobserver.moe/images/sitebutton.png"></a>
    <a class="sitebutton-shinya" href="https://shinya.39s.moe/" target="_blank" rel="noopener">
        <div class="btn-glow"></div>
        <svg viewBox="0 0 88 31" xmlns="http://www.w3.org/2000/svg" shape-rendering="crispEdges">

            <!-- background: soft dark navy, evocative of night sky / anime atmosphere -->
            <rect width="88" height="31" fill="#12101e"/>

            <!-- top gradient strip (sakura pink blush) -->
            <rect x="0" y="0" width="88" height="4" fill="#e879a0" opacity="0.18"/>

            <!-- pixel star cluster top-right -->
            <rect x="66" y="2" width="1" height="1" fill="#fff" opacity="0.9"/>
            <rect x="71" y="4" width="1" height="1" fill="#fff" opacity="0.6"/>
            <rect x="78" y="1" width="1" height="1" fill="#fff" opacity="0.8"/>
            <rect x="83" y="5" width="1" height="1" fill="#fff" opacity="0.5"/>
            <rect x="75" y="7" width="1" height="1" fill="#fff" opacity="0.4"/>
            <rect x="60" y="3" width="1" height="1" fill="#fff" opacity="0.3"/>

            <!-- pixel sakura petal cluster (right side) -->
            <!-- petal 1 -->
            <rect x="64" y="10" width="3" height="2" fill="#f9a8d4" opacity="0.9"/>
            <rect x="63" y="11" width="5" height="1" fill="#f9a8d4" opacity="0.7"/>
            <!-- petal 2 (smaller, offset) -->
            <rect x="70" y="14" width="2" height="2" fill="#fbbfe8" opacity="0.8"/>
            <rect x="69" y="15" width="4" height="1" fill="#fbbfe8" opacity="0.6"/>
            <!-- petal 3 (falling) -->
            <rect x="59" y="18" width="2" height="1" fill="#f9a8d4" opacity="0.5"/>
            <rect x="76" y="20" width="2" height="2" fill="#fbbfe8" opacity="0.55"/>
            <rect x="75" y="21" width="4" height="1" fill="#fbbfe8" opacity="0.4"/>
            <!-- tiny dot petals -->
            <rect x="68" y="8"  width="1" height="1" fill="#f9a8d4" opacity="0.6"/>
            <rect x="80" y="17" width="1" height="1" fill="#fbbfe8" opacity="0.5"/>
            <rect x="85" y="11" width="1" height="1" fill="#f9a8d4" opacity="0.4"/>

            <!-- moon (crescent-ish via overlap) -->
            <rect x="55" y="5" width="6" height="6" rx="3" fill="#ffe4b5" opacity="0.85"/>
            <rect x="57" y="4" width="6" height="6" rx="3" fill="#12101e"/>

            <!-- divider line -->
            <rect x="0" y="22" width="88" height="1" fill="#e879a0" opacity="0.22"/>

            <!-- "shinya" text — pixel font, hand-plotted 5x7 glyphs, warm white -->
            <!-- S -->
            <rect x="4"  y="8"  width="5" height="1" fill="#f5e6ff"/>
            <rect x="4"  y="9"  width="1" height="2" fill="#f5e6ff"/>
            <rect x="4"  y="11" width="5" height="1" fill="#f5e6ff"/>
            <rect x="8"  y="12" width="1" height="2" fill="#f5e6ff"/>
            <rect x="4"  y="14" width="5" height="1" fill="#f5e6ff"/>
            <!-- H -->
            <rect x="11" y="8"  width="1" height="7" fill="#f5e6ff"/>
            <rect x="15" y="8"  width="1" height="7" fill="#f5e6ff"/>
            <rect x="11" y="11" width="5" height="1" fill="#f5e6ff"/>
            <!-- I -->
            <rect x="18" y="8"  width="3" height="1" fill="#f5e6ff"/>
            <rect x="19" y="9"  width="1" height="5" fill="#f5e6ff"/>
            <rect x="18" y="14" width="3" height="1" fill="#f5e6ff"/>
            <!-- N -->
            <rect x="23" y="8"  width="1" height="7" fill="#f5e6ff"/>
            <rect x="27" y="8"  width="1" height="7" fill="#f5e6ff"/>
            <rect x="24" y="9"  width="1" height="1" fill="#f5e6ff"/>
            <rect x="25" y="10" width="1" height="1" fill="#f5e6ff"/>
            <rect x="26" y="11" width="1" height="1" fill="#f5e6ff"/>
            <!-- Y -->
            <rect x="30" y="8"  width="1" height="1" fill="#f5e6ff"/>
            <rect x="34" y="8"  width="1" height="1" fill="#f5e6ff"/>
            <rect x="31" y="9"  width="1" height="1" fill="#f5e6ff"/>
            <rect x="33" y="9"  width="1" height="1" fill="#f5e6ff"/>
            <rect x="32" y="10" width="1" height="5" fill="#f5e6ff"/>
            <!-- A -->
            <rect x="37" y="8"  width="3" height="1" fill="#f5e6ff"/>
            <rect x="36" y="9"  width="1" height="6" fill="#f5e6ff"/>
            <rect x="40" y="9"  width="1" height="6" fill="#f5e6ff"/>
            <rect x="36" y="12" width="5" height="1" fill="#f5e6ff"/>

            <!-- ".39s.moe" subtext in soft pink -->
            <text x="4" y="20" font-family="monospace" font-size="4.5" fill="#f9a8d4" opacity="0.9" letter-spacing="0.4">.39s.moe</text>

        </svg>
    </a>
    <!-- <div id="warning-box"></div>
    <script src="script.js"></script> -->
</body>
</html>
